<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#3a3a4a"/>
  <rect y="0" width="120" height="8" rx="8" fill="#3a3a4a"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#ccc" font-weight="bold">METASYNTHESIS</text>
  <!-- Icon -->
  
    <rect x="24" y="40" width="18" height="18" rx="2.5" fill="#e8a830" opacity="0.55" stroke="#e8a830" stroke-width="0.8"/>
    <text x="33" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1a1a2e" font-weight="bold">$</text>
    <rect x="51" y="40" width="18" height="18" rx="2.5" fill="#7a5230" opacity="0.55" stroke="#7a5230" stroke-width="0.8"/>
    <text x="60" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ddd" font-weight="bold">M</text>
    <rect x="78" y="40" width="18" height="18" rx="2.5" fill="#c890b8" opacity="0.55" stroke="#c890b8" stroke-width="0.8"/>
    <text x="87" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1a1a2e" font-weight="bold">S</text>
    <line x1="33" y1="63" x2="87" y2="63" stroke="#8888a0" stroke-width="1.2" opacity="0.5"/>
    <polygon points="33,67 36,74 30,74" fill="#8888a0" opacity="0.5"/>
    <polygon points="60,67 63,74 57,74" fill="#8888a0" opacity="0.5"/>
    <polygon points="87,67 90,74 84,74" fill="#8888a0" opacity="0.5"/>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#3a3a4a" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccc" font-weight="bold">17</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#3a3a4a" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ccc" font-weight="bold">11</text>
  <!-- Border -->
  <rect x="1" y="1" width="118" height="118" rx="7" fill="none" stroke="#5a5a6a" stroke-width="2"/>
</svg>