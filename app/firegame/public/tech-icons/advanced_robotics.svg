<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#B5CC18"/>
  <rect y="0" width="120" height="8" rx="8" fill="#B5CC18"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#1a1a2e" font-weight="bold">ADV. ROBOTICS</text>
  <!-- Icon -->
  
    <circle cx="60" cy="54" r="16" fill="#B5CC18" opacity="0.12"/>
    <circle cx="60" cy="54" r="16" fill="none" stroke="#B5CC18" stroke-width="1.8"/>
    <circle cx="60" cy="54" r="10" fill="none" stroke="#B5CC18" stroke-width="1" opacity="0.5"/>
    <text x="60" y="61" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#B5CC18" font-weight="bold">+1</text>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#B5CC18" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#1a1a2e" font-weight="bold">8</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#B5CC18" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">5</text>
  <!-- Border -->
  <rect x="1" y="1" width="118" height="118" rx="7" fill="none" stroke="#B5CC18" stroke-width="2"/>
</svg>