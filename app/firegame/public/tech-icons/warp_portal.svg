  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ccc" font-weight="bold">WARP PORTAL</text>
  <!-- Icon -->
  
    <circle cx="60" cy="54" r="20" fill="#8888a0" opacity="0.03"/>
