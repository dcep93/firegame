<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#B5CC18"/>
  <rect y="0" width="120" height="8" rx="8" fill="#B5CC18"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">MONOLITH</text>
  <!-- Icon -->
  
    <rect x="44" y="32" width="32" height="48" rx="2" fill="#B5CC18" opacity="0.1"/>
    <rect x="44" y="32" width="32" height="48" rx="2" fill="none" stroke="#B5CC18" stroke-width="1.8"/>
    <line x1="51" y1="37" x2="51" y2="74" stroke="#B5CC18" stroke-width="0.8" opacity="0.4"/>
    <line x1="60" y1="34" x2="60" y2="78" stroke="#B5CC18" stroke-width="1" opacity="0.5"/>
    <line x1="69" y1="37" x2="69" y2="74" stroke="#B5CC18" stroke-width="0.8" opacity="0.4"/>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#B5CC18" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">12</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#B5CC18" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">6</text>
