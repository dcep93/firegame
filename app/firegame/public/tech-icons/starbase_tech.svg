<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#D63384"/>
  <rect y="0" width="120" height="8" rx="8" fill="#D63384"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="bold">STARBASE</text>
  <!-- Icon -->
  
    <polygon points="60,32 64,46 78,46 67,55 71,70 60,62 49,70 53,55 42,46 56,46" fill="none" stroke="#D63384" stroke-width="2.2"/>
    <circle cx="60" cy="53" r="7" fill="#D63384" opacity="0.3"/>
    <circle cx="60" cy="53" r="3.5" fill="#D63384" opacity="0.6"/>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#D63384" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#fff" font-weight="bold">4</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#D63384" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="bold">3</text>
  <!-- Border -->
