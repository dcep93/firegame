  <rect y="0" width="120" height="26" fill="#D63384"/>
  <rect y="0" width="120" height="8" rx="8" fill="#D63384"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#fff" font-weight="bold">GLUON COMPUTER</text>
  <!-- Icon -->
  
    <circle cx="60" cy="56" r="14" fill="none" stroke="#D63384" stroke-width="2"/>
    <circle cx="60" cy="56" r="7" fill="none" stroke="#D63384" stroke-width="1.3"/>
    <circle cx="60" cy="56" r="2.5" fill="#D63384" opacity="0.6"/>
    <line x1="60" y1="38" x2="60" y2="45" stroke="#D63384" stroke-width="1.5"/>
    <line x1="60" y1="67" x2="60" y2="74" stroke="#D63384" stroke-width="1.5"/>
    <line x1="42" y1="56" x2="49" y2="56" stroke="#D63384" stroke-width="1.5"/>
    <line x1="71" y1="56" x2="78" y2="56" stroke="#D63384" stroke-width="1.5"/>
    <line x1="46" y1="43" x2="50" y2="47" stroke="#D63384" stroke-width="1" opacity="0.6"/>
    <line x1="74" y1="43" x2="70" y2="47" stroke="#D63384" stroke-width="1" opacity="0.6"/>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#D63384" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#fff" font-weight="bold">14</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#D63384" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="bold">7</text>
  <!-- Border -->
