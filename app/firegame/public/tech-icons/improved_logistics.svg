<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#3a3a4a"/>
  <rect y="0" width="120" height="8" rx="8" fill="#3a3a4a"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#ccc" font-weight="bold">IMPR. LOGISTICS</text>
  <!-- Icon -->
  
    <polygon points="60,33 76,48 69,48 69,57 76,57 60,72 44,57 51,57 51,48 44,48" fill="#8888a0" opacity="0.45" stroke="#8888a0" stroke-width="1.3"/>
    <text x="60" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#8888a0" font-weight="bold">+1</text>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#3a3a4a" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#ccc" font-weight="bold">7</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#3a3a4a" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ccc" font-weight="bold">6</text>
  <!-- Border -->
  <rect x="1" y="1" width="118" height="118" rx="7" fill="none" stroke="#5a5a6a" stroke-width="2"/>
</svg>