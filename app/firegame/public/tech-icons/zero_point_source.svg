    <ellipse cx="60" cy="52" rx="20" ry="4.5" fill="none" stroke="#8888a0" stroke-width="0.8" opacity="0.3" transform="rotate(120 60 52)"/>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#3a3a4a" opacity="0.9"/>
