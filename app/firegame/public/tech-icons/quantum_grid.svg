<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#1A7A42"/>
  <rect y="0" width="120" height="8" rx="8" fill="#1A7A42"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff" font-weight="bold">QUANTUM GRID</text>
  <!-- Icon -->
  
    <circle cx="45" cy="50" r="10" fill="#1A7A42" opacity="0.12"/>
    <circle cx="45" cy="50" r="10" fill="none" stroke="#1A7A42" stroke-width="1.3"/>
    <circle cx="75" cy="50" r="10" fill="#1A7A42" opacity="0.12"/>
    <circle cx="75" cy="50" r="10" fill="none" stroke="#1A7A42" stroke-width="1.3"/>
    <text x="60" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#1A7A42" font-weight="bold">+2</text>
    <line x1="32" y1="68" x2="88" y2="68" stroke="#1A7A42" stroke-width="0.7" opacity="0.3"/>
    <line x1="32" y1="75" x2="88" y2="75" stroke="#1A7A42" stroke-width="0.7" opacity="0.3"/>
    <line x1="45" y1="63" x2="45" y2="80" stroke="#1A7A42" stroke-width="0.7" opacity="0.3"/>
    <line x1="60" y1="63" x2="60" y2="80" stroke="#1A7A42" stroke-width="0.7" opacity="0.3"/>
    <line x1="75" y1="63" x2="75" y2="80" stroke="#1A7A42" stroke-width="0.7" opacity="0.3"/>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#1A7A42" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#fff" font-weight="bold">16</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#1A7A42" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fff" font-weight="bold">8</text>
  <!-- Border -->
  <rect x="1" y="1" width="118" height="118" rx="7" fill="none" stroke="#1A7A42" stroke-width="2"/>
</svg>