<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#1a1a2e"/>
  <!-- Top banner -->
  <rect y="0" width="120" height="26" fill="#B5CC18"/>
  <rect y="0" width="120" height="8" rx="8" fill="#B5CC18"/>
  <text x="60" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">ADV. LABS</text>
  <!-- Icon -->
  
    <circle cx="60" cy="52" r="4" fill="#c890b8" opacity="0.7"/>
    <ellipse cx="60" cy="52" rx="19" ry="7" fill="none" stroke="#B5CC18" stroke-width="1.3" transform="rotate(0 60 52)"/>
    <ellipse cx="60" cy="52" rx="19" ry="7" fill="none" stroke="#B5CC18" stroke-width="1.3" transform="rotate(60 60 52)"/>
    <ellipse cx="60" cy="52" rx="19" ry="7" fill="none" stroke="#B5CC18" stroke-width="1.3" transform="rotate(-60 60 52)"/>
    <rect x="50" y="70" width="20" height="10" rx="2" fill="#c890b8" opacity="0.2"/>
    <text x="60" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#c890b8" font-weight="bold">S</text>
  <!-- Max cost circle (bottom-left, big) -->
  <circle cx="22" cy="104" r="14" fill="#B5CC18" opacity="0.9"/>
  <text x="22" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">10</text>
  <!-- Min cost (bottom-right, small) -->
  <circle cx="100" cy="106" r="10" fill="#B5CC18" opacity="0.55"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">6</text>
  <!-- Border -->
  <rect x="1" y="1" width="118" height="118" rx="7" fill="none" stroke="#B5CC18" stroke-width="2"/>
</svg>